name: Fix SmartNews Feed
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'
jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install lxml requests beautifulsoup4

      - name: Build SmartNews feed from WP REST API
        run: |
          python3 <<'PYEOF'
          import requests, datetime, re, sys
          from lxml import etree
          from bs4 import BeautifulSoup
          from email.utils import format_datetime

          # -------------------------------------------------------
          # CONFIG
          # Uses the WP REST API directly - bypasses stale RSS cache
          # Category ID 3557 = "news" on cabletv.com
          # -------------------------------------------------------
          API_BASE = "https://www.cabletv.com/wp-json/wp/v2"
          CATEGORY_ID = 3557
          PER_PAGE = 10
          HEADERS = {"User-Agent": "Mozilla/5.0 (compatible; feedfetcher/1.0)"}

          SNF_NS = "http://www.smartnews.be/snf"
          MEDIA_NS = "http://search.yahoo.com/mrss/"
          CONTENT_NS = "http://purl.org/rss/1.0/modules/content/"
          DC_NS = "http://purl.org/dc/elements/1.1/"

          def clean_content(html):
              """Remove WPBakery shortcodes and other junk from content HTML."""
              # Strip all [ ... ] shortcodes (WPBakery, etc.)
              html = re.sub(r'\[/?[a-zA-Z_][^\]]*\]', '', html)
              # Strip any leftover empty tags or excessive whitespace
              soup = BeautifulSoup(html, "html.parser")
              # Remove empty block elements left behind by shortcodes
              for tag in soup.find_all(['div', 'p', 'span']):
                  if not tag.get_text(strip=True) and not tag.find('img'):
                      tag.decompose()
              return str(soup)

          # --- Fetch latest posts from REST API ---
          api_url = (
              f"{API_BASE}/posts"
              f"?categories={CATEGORY_ID}"
              f"&per_page={PER_PAGE}"
              f"&orderby=date&order=desc"
              f"&_fields=id,date,modified,title,link,excerpt,content,author,featured_media,_links"
          )
          print(f"Fetching: {api_url}")
          resp = requests.get(api_url, headers=HEADERS, timeout=20)
          if resp.status_code != 200:
              print(f"ERROR: REST API returned {resp.status_code}", file=sys.stderr)
              sys.exit(1)
          posts = resp.json()
          print(f"Got {len(posts)} posts from REST API")

          # --- Pre-fetch author names ---
          author_cache = {}
          def get_author(author_id):
              if author_id in author_cache:
                  return author_cache[author_id]
              try:
                  r = requests.get(f"{API_BASE}/users/{author_id}", headers=HEADERS, timeout=10)
                  name = r.json().get("name", "CableTV.com") if r.status_code == 200 else "CableTV.com"
              except:
                  name = "CableTV.com"
              author_cache[author_id] = name
              return name

          # --- Pre-fetch featured media URLs ---
          media_cache = {}
          def get_media_url(media_id):
              if media_id in media_cache:
                  return media_cache[media_id]
              if not media_id:
                  return None
              try:
                  r = requests.get(f"{API_BASE}/media/{media_id}", headers=HEADERS, timeout=10)
                  if r.status_code == 200:
                      data = r.json()
                      sizes = data.get("media_details", {}).get("sizes", {})
                      url = (
                          sizes.get("large", {}).get("source_url")
                          or sizes.get("full", {}).get("source_url")
                          or data.get("source_url")
                      )
                      media_cache[media_id] = url
                      return url
              except:
                  pass
              media_cache[media_id] = None
              return None

          # --- Build RSS XML ---
          rss = etree.Element("rss", nsmap={
              "content": CONTENT_NS,
              "dc": DC_NS,
              "media": MEDIA_NS,
              "snf": SNF_NS,
              "atom": "http://www.w3.org/2005/Atom",
              "wfw": "http://wellformedweb.org/CommentAPI/",
              "sy": "http://purl.org/rss/1.0/modules/syndication/",
          })
          rss.set("version", "2.0")
          channel = etree.SubElement(rss, "channel")

          now_dt = datetime.datetime.now(datetime.timezone.utc)
          now_rfc = format_datetime(now_dt)

          def sub_text(parent, tag, text):
              el = etree.SubElement(parent, tag)
              el.text = text
              return el

          sub_text(channel, "title", "Entertainment News | CableTV.com")
          sub_text(channel, "link", "https://www.cabletv.com/category/news")
          sub_text(channel, "description", "Super fans, rejoice! Our entertainment news keeps you passionate about sports, TV, and streaming.")
          sub_text(channel, "lastBuildDate", now_rfc)
          sub_text(channel, "language", "en-US")

          atom_link = etree.SubElement(channel, "{http://www.w3.org/2005/Atom}link")
          atom_link.set("href", "https://www.cabletv.com/category/news/feed")
          atom_link.set("rel", "self")
          atom_link.set("type", "application/rss+xml")

          sy_period = etree.SubElement(channel, "{http://purl.org/rss/1.0/modules/syndication/}updatePeriod")
          sy_period.text = "hourly"
          sy_freq = etree.SubElement(channel, "{http://purl.org/rss/1.0/modules/syndication/}updateFrequency")
          sy_freq.text = "1"

          logo_el = etree.SubElement(channel, f"{{{SNF_NS}}}logo")
          logo_url_el = etree.SubElement(logo_el, "url")
          logo_url_el.text = "https://raw.githubusercontent.com/WatchCTV/SmartNews/main/CableTV.com%20RSS%20Logo%20Header.png"

          img_el = etree.SubElement(channel, "image")
          sub_text(img_el, "url", "https://www.cabletv.com/app/uploads/2020/12/cropped-favicon2-32x32.png")
          sub_text(img_el, "title", "Entertainment News | CableTV.com")
          sub_text(img_el, "link", "https://www.cabletv.com/category/news")
          sub_text(img_el, "width", "32")
          sub_text(img_el, "height", "32")

          year_full = str(now_dt.year)

          # --- Build items ---
          for post in posts:
              post_id = post["id"]
              post_link = post["link"]
              post_title_raw = post["title"]["rendered"]
              post_title = BeautifulSoup(post_title_raw, "html.parser").get_text()
              post_title = re.sub(
                  r'\[current_date\s+format\s*=\s*["\']?[yY]{1,4}["\']?\]',
                  year_full, post_title
              )

              try:
                  pub_dt = datetime.datetime.fromisoformat(post["date"] + "+00:00")
                  pub_date = format_datetime(pub_dt)
              except:
                  pub_date = now_rfc

              author_id = post.get("author", 0)
              author_name = get_author(author_id)
              print(f"  Processing: {post_title[:60]}")

              media_id = post.get("featured_media", 0)
              img_url = get_media_url(media_id)

              if not img_url:
                  try:
                      art_resp = requests.get(post_link, headers=HEADERS, timeout=10)
                      if art_resp.status_code == 200:
                          art_soup = BeautifulSoup(art_resp.text, "html.parser")
                          meta_img = art_soup.select_one('meta[property="og:image"]')
                          if meta_img and meta_img.get("content"):
                              img_url = meta_img["content"].strip()
                  except Exception as e:
                      print(f"    og:image fallback failed: {e}")

              # Clean WPBakery shortcodes from content
              content_raw = post["content"]["rendered"]
              content_clean = clean_content(content_raw)

              if img_url and img_url not in content_clean:
                  img_html = f'<div style="margin:20px 0;text-align:center;"><img src="{img_url}" alt="" style="max-width:100%;height:auto;border-radius:8px;"/></div>'
                  content_full = img_html + content_clean
              else:
                  content_full = content_clean

              excerpt_raw = post["excerpt"]["rendered"]
              excerpt_text = BeautifulSoup(excerpt_raw, "html.parser").get_text(strip=True)
              # Also strip shortcodes from excerpt just in case
              excerpt_text = re.sub(r'\[/?[a-zA-Z_][^\]]*\]', '', excerpt_text).strip()

              item = etree.SubElement(channel, "item")
              t = etree.SubElement(item, "title")
              t.text = post_title
              l = etree.SubElement(item, "link")
              l.text = post_link
              pd = etree.SubElement(item, "pubDate")
              pd.text = pub_date
              cr = etree.SubElement(item, f"{{{DC_NS}}}creator")
              cr.text = etree.CDATA(author_name)
              g = etree.SubElement(item, "guid")
              g.set("isPermaLink", "false")
              g.text = post_link
              de = etree.SubElement(item, "description")
              de.text = etree.CDATA(f"<p>{excerpt_text}</p>")
              ce = etree.SubElement(item, f"{{{CONTENT_NS}}}encoded")
              ce.text = etree.CDATA(content_full)
              if img_url:
                  thumb = etree.SubElement(item, f"{{{MEDIA_NS}}}thumbnail")
                  thumb.set("url", img_url)

          tree = etree.ElementTree(rss)
          tree.write("feed.xml", encoding="utf-8", xml_declaration=True, pretty_print=True)
          print(f"Done. Feed written with {len(posts)} items. lastBuildDate: {now_rfc}")
          PYEOF

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add feed.xml
          git commit -m "Auto-update SmartNews feed $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "Nothing to commit"
          git push
